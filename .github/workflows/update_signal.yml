name: Update MACD Signal

on:
  # 每次推送代码时运行
  push:
    branches: [main]
  # 交易时段每 30 分钟运行；北京时间 = UTC+8
  schedule:
    - cron: '30 1-3 * * 1-5'   # 09:30, 10:30, 11:30
    - cron: '0 2-3 * * 1-5'    # 10:00, 11:00
    - cron: '0,30 5-6 * * 1-5' # 13:00, 13:30, 14:00, 14:30
    - cron: '0 7 * * 1-5'      # 15:00 盘中最终估算
    - cron: '30 7 * * 1-5'
  # 手动触发
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-macd-signal
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run signal update
        env:
          SIGNAL_PHASE: ${{ github.event_name == 'schedule' && (github.event.schedule == '30 7 * * 1-5' && 'close' || 'intraday') || 'auto' }}
        run: python run_signal.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/signal_data.json
          git diff --cached --quiet || git commit -m "signal: $(date -u +%Y-%m-%d\ %H:%M)"
          git push
