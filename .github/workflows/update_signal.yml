name: Update MACD Signal

on:
  # 盘中每15分钟运行 (北京时间 9:30-15:00 = UTC 1:30-7:00)
  schedule:
    - cron: '0,15,30,45 1-7 * * 1-5'
    - cron: '30 7 * * 1-5'
  # 手动触发
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run signal update
        run: python run_signal.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/signal_data.json
          git diff --cached --quiet || git commit -m "signal: $(date -u +%Y-%m-%d\ %H:%M)"
          git push
