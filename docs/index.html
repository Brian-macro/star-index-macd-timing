<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>科创综指 MACD 择时信号</title>
<style>
  /* ═══ Apple HIG Dark Mode Design System ═══ */
  :root {
    --bg:        #000000;
    --surface:   #1C1C1E;
    --surface2:  #2C2C2E;
    --surface3:  #3A3A3C;
    --ink:       #F5F5F7;
    --secondary: #98989D;
    --tertiary:  #636366;
    --divider:   rgba(84,84,88,0.35);
    --accent:    #0A84FF;
    --green:     #30D158;
    --green-bg:  rgba(48,209,88,0.12);
    --red:       #FF453A;
    --red-bg:    rgba(255,69,58,0.12);
    --orange:    #FF9F0A;
    --orange-bg: rgba(255,159,10,0.10);
    --font:      -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', sans-serif;
    --mono:      'SF Mono', SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    --ease:      cubic-bezier(0.25, 0.1, 0.25, 1);
  }
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--ink);
    line-height: 1.47;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* ── Layout ── */
  .page { max-width: 980px; margin: 0 auto; padding: 0 24px 80px; }

  /* ── Nav Bar ── */
  .nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 0;
    border-bottom: 1px solid var(--divider);
    margin-bottom: 64px;
  }
  .nav-left { display: flex; align-items: center; gap: 14px; }
  .avatar {
    width: 44px; height: 44px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid var(--surface3);
    transition: transform 0.25s var(--ease), border-color 0.25s;
  }
  .avatar:hover { transform: scale(1.1); border-color: var(--accent); }
  .nav-title { font-size: 17px; font-weight: 600; letter-spacing: -0.02em; }
  .nav-sub { font-size: 13px; color: var(--secondary); margin-top: 1px; }
  .nav-right { display: flex; gap: 8px; }

  /* ── Social Buttons ── */
  .soc {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 16px; border-radius: 980px;
    border: 1px solid var(--divider);
    background: transparent;
    color: var(--secondary);
    text-decoration: none;
    font-size: 13px; font-weight: 500;
    transition: transform 0.2s var(--ease), background 0.2s, color 0.2s, border-color 0.2s;
  }
  .soc svg { width: 18px; height: 18px; }
  .soc:hover { transform: scale(1.1); background: var(--surface); color: var(--ink); }
  .soc:active { transform: scale(0.95); }
  .soc.bili:hover { border-color: rgba(0,161,214,0.4); color: #00A1D6; background: rgba(0,161,214,0.08); }
  .soc.gh:hover  { border-color: rgba(255,255,255,0.2); color: #fff; background: var(--surface2); }

  /* ── Section module ── */
  .mod { margin-top: 64px; }
  .mod-head {
    font-size: 12px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--secondary);
    margin-bottom: 16px;
  }

  /* ── Approaching Alert ── */
  .app-card {
    background: var(--surface);
    border-radius: 16px;
    padding: 16px 20px;
    display: flex; align-items: center; gap: 14px;
    margin-top: 32px;
    transition: background 0.3s, border-color 0.3s;
    border: 1px solid transparent;
  }
  .app-card.warn-dead {
    background: var(--red-bg);
    border-color: rgba(255,69,58,0.25);
  }
  .app-card.warn-gold {
    background: var(--green-bg);
    border-color: rgba(48,209,88,0.25);
  }
  .app-icon { font-size: 22px; flex-shrink: 0; }
  .app-body { flex: 1; }
  .app-title { font-size: 14px; font-weight: 600; letter-spacing: -0.01em; }
  .app-card.warn-dead .app-title { color: var(--red); }
  .app-card.warn-gold .app-title { color: var(--green); }
  .app-sub {
    font-size: 12px; color: var(--secondary);
    margin-top: 2px; font-family: var(--mono);
  }
  .app-bar-wrap {
    flex-shrink: 0; width: 120px;
    background: var(--surface2); border-radius: 4px; height: 6px;
    overflow: hidden;
  }
  .app-bar-fill {
    height: 100%; border-radius: 4px;
    transition: width 0.5s var(--ease);
  }
  .app-bar-fill.far   { background: var(--tertiary); }
  .app-bar-fill.near  { background: var(--orange); }
  .app-bar-fill.close { background: var(--red); }
  .app-pct {
    font-size: 13px; font-weight: 600; font-family: var(--mono);
    width: 52px; text-align: right; flex-shrink: 0;
  }

  /* ── Hero: Current Signal ── */
  .hero-price {
    font-size: clamp(48px, 8vw, 72px);
    font-weight: 700;
    letter-spacing: -0.03em;
    line-height: 1;
  }
  .hero-price.long { color: var(--green); }
  .hero-price.cash { color: var(--red); }
  .hero-badge {
    display: inline-block;
    font-size: 14px; font-weight: 600;
    padding: 5px 14px; border-radius: 980px;
    margin-bottom: 12px;
  }
  .hero-badge.long  { background: var(--green-bg); color: var(--green); }
  .hero-badge.cash  { background: var(--red-bg);   color: var(--red);   }
  .hero-meta {
    font-size: 15px; color: var(--secondary);
    margin-top: 8px; line-height: 1.6;
  }
  .hero-meta strong { color: var(--ink); font-weight: 500; }
  .hero-right {
    margin-top: 16px;
    display: flex; gap: 24px; flex-wrap: wrap;
    font-size: 13px; color: var(--secondary);
    font-family: var(--mono);
  }
  .hero-right span { color: var(--ink); font-weight: 500; }
  .update-tag {
    display: inline-block;
    font-size: 12px; color: var(--tertiary);
    margin-top: 16px;
    padding: 4px 10px;
    background: var(--surface);
    border-radius: 6px;
  }

  /* ── Realtime Monitor ── */
  .rt-card {
    background: var(--surface);
    border-radius: 16px;
    padding: 20px 24px;
    position: relative;
    overflow: hidden;
  }
  .rt-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--green));
  }
  .rt-card.cross-up::before { background: var(--green); }
  .rt-card.cross-down::before { background: var(--red); }
  .rt-head {
    display: flex; align-items: center; gap: 8px;
    font-size: 14px; font-weight: 600; color: var(--secondary);
    margin-bottom: 12px;
  }
  .rt-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--green);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.25} }
  .rt-alert {
    font-size: 15px; font-weight: 600;
    padding: 8px 14px; border-radius: 10px;
    margin-bottom: 14px;
  }
  .rt-alert.up      { background: var(--green-bg); color: var(--green); }
  .rt-alert.down    { background: var(--red-bg);   color: var(--red);   }
  .rt-alert.neutral { background: rgba(142,142,147,0.12); color: var(--secondary); }
  .rt-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 8px;
  }
  .rt-item { font-family: var(--mono); font-size: 13px; color: var(--tertiary); }
  .rt-item b { color: var(--ink); font-weight: 500; }

  /* ── Metrics: Big Number Grid ── */
  .metrics {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 1px;
    background: var(--divider);
    border-radius: 16px;
    overflow: hidden;
  }
  .m-cell {
    background: var(--surface);
    padding: 24px;
  }
  .m-label {
    font-size: 13px; font-weight: 500;
    color: var(--secondary);
    margin-bottom: 6px;
  }
  .m-val {
    font-size: 34px; font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.1;
  }
  .m-sub {
    font-size: 12px; color: var(--tertiary);
    margin-top: 4px;
    font-family: var(--mono);
  }
  .up   { color: var(--green); }
  .down { color: var(--red);   }

  /* ── Yearly Chart ── */
  .chart {
    background: var(--surface);
    border-radius: 16px;
    padding: 28px 24px 20px;
  }
  .chart-wrap {
    position: relative;
    height: 150px;
  }
  .chart-bars {
    display: flex; gap: 6px;
    height: 100%;
  }
  .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; height: 100%; position: relative; }
  .bar-pair { display: flex; gap: 3px; align-items: flex-end; }
  .bar { width: 20px; min-height: 2px; transition: height 0.5s var(--ease); position: relative; }
  .bar.pos { border-radius: 4px 4px 0 0; }
  .bar.neg { border-radius: 0 0 4px 4px; }
  .bar.sp { background: var(--green); }
  .bar.sn { background: var(--red); }
  .bar.bp { background: rgba(142,142,147,0.2); }
  .bar.bn { background: rgba(255,69,58,0.15); }
  .bar-tip {
    position: absolute; left: 50%; transform: translateX(-50%);
    font-family: var(--mono); font-size: 10px; font-weight: 600; white-space: nowrap;
  }
  .bar-tip.above { top: -18px; }
  .bar-tip.below { bottom: -18px; }
  .bar-yr { font-size: 12px; color: var(--tertiary); margin-top: 8px; font-family: var(--mono); }
  .legend {
    display: flex; gap: 24px; justify-content: center;
    margin-top: 20px; font-size: 12px; color: var(--tertiary);
  }
  .legend i { display: inline-block; width: 10px; height: 10px; border-radius: 3px; margin-right: 6px; vertical-align: middle; }
  .chart-zero {
    position: absolute; left: 0; right: 0; top: 50%;
    border-top: 1px dashed rgba(84,84,88,0.25);
    z-index: 0;
  }

  /* ── Tables ── */
  .tbl-wrap {
    background: var(--surface);
    border-radius: 16px;
    overflow: hidden;
  }
  .tbl-scroll { overflow-x: auto; overflow-y: auto; max-height: 360px; }
  .tbl-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
  .tbl-scroll::-webkit-scrollbar-track { background: transparent; }
  .tbl-scroll::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 3px; }
  .tbl-scroll::-webkit-scrollbar-thumb:hover { background: var(--tertiary); }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th {
    text-align: left; padding: 12px 16px;
    font-size: 12px; font-weight: 600;
    color: var(--secondary); text-transform: uppercase; letter-spacing: 0.04em;
    background: var(--surface2); border-bottom: 1px solid var(--divider);
    white-space: nowrap;
  }
  td {
    padding: 12px 16px;
    border-bottom: 1px solid var(--divider);
    color: var(--secondary); white-space: nowrap;
    font-family: var(--mono); font-size: 12px;
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,0.02); }

  /* ── Disclaimer ── */
  .disc {
    background: var(--orange-bg);
    border-radius: 14px;
    padding: 16px 20px;
    font-size: 13px; color: var(--orange);
    line-height: 1.6;
    margin-top: 64px;
  }

  /* ── Footer ── */
  .foot {
    text-align: center;
    padding: 40px 0 0;
    margin-top: 40px;
    border-top: 1px solid var(--divider);
    font-size: 12px; color: var(--tertiary);
    line-height: 1.8;
  }

  /* ── Nav Curve ── */
  .nav-chart-wrap {
    background: var(--surface);
    border-radius: 16px;
    padding: 24px;
    position: relative;
  }
  .nav-chart-wrap svg { width: 100%; height: auto; display: block; }
  .nav-chart-wrap .nc-label { font-size: 11px; fill: var(--tertiary); font-family: var(--mono); }
  .nav-chart-wrap .nc-val { font-size: 12px; font-weight: 600; font-family: var(--mono); }
  .nc-legend { display: flex; gap: 20px; margin-top: 14px; font-size: 12px; color: var(--tertiary); }
  .nc-legend i { display: inline-block; width: 18px; height: 3px; border-radius: 2px; margin-right: 6px; vertical-align: middle; }
  .nc-current { display: flex; gap: 32px; margin-bottom: 16px; }
  .nc-current-item {}
  .nc-current-label { font-size: 12px; color: var(--tertiary); }
  .nc-current-val { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; margin-top: 2px; }

  /* ── Responsive ── */
  @media (max-width: 768px) {
    .nav { flex-direction: column; align-items: flex-start; gap: 12px; }
    .nav-right { width: 100%; }
    .hero-price { font-size: 48px; }
    .m-val { font-size: 26px; }
    .bar { width: 14px; }
    .chart-bars { gap: 3px; }
  }
  @media (max-width: 480px) {
    .page { padding: 0 16px 48px; }
    .metrics { grid-template-columns: 1fr 1fr; }
    .m-val { font-size: 22px; }
    table { font-size: 11px; }
    th, td { padding: 10px 12px; }
  }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: .01ms !important; transition-duration: .01ms !important; }
  }
</style>
</head>

<script>
// ═══ Embedded Data (works locally without fetch) ═══
var EMBEDDED = null;

function loadData(cb) {
  // Try fetch first (works on HTTP), fallback to embedded
  fetch('signal_data.json?t=' + Date.now())
    .then(function(r) { return r.json(); })
    .then(function(d) { cb(d); })
    .catch(function() {
      if (EMBEDDED) { cb(EMBEDDED); return; }
      document.getElementById('app').innerHTML =
        '<div style="text-align:center;padding:80px 0;color:var(--red)">' +
        '<p style="font-size:18px;font-weight:600">数据加载失败</p>' +
        '<p style="color:var(--secondary);margin-top:8px;font-size:14px">请确认 signal_data.json 与 index.html 在同一目录</p></div>';
    });
}

function pct(v) {
  if (v == null) return '--';
  var n = parseFloat(v);
  if (isNaN(n)) return '--';
  return (n > 0 ? '+' : '') + n.toFixed(2) + '%';
}
function sign(v) { var n = parseFloat(v); return isNaN(n) ? '' : n >= 0 ? 'up' : 'down'; }

function render(d) {
  var c = d.current, p = d.performance, b = d.benchmark;
  var live = d.intraday || null;
  var signalStatus = d.signal_status || { label: live ? '预估信号' : '收盘确认' };
  var view = live || { price: c.close, dif: c.dif, dea: c.dea, macd_bar: c.macd_bar };
  var pos = c.position === 'long' ? 'long' : 'cash';
  var h = '';

  // ── Module 1: 当前信号 ──
  h += '<div class="mod">';
  h += '<div class="mod-head">当前信号</div>';
  h += '<div class="hero-badge ' + pos + '">' + c.position_cn + '</div>';
  if (live) {
    h += '<div style="display:inline-block;margin-left:8px;padding:5px 10px;border-radius:999px;background:rgba(255,159,10,.16);color:#ff9f0a;font-size:12px;font-weight:700">预估信号 · ' + live.signal_label + '</div>';
  } else {
    h += '<div style="display:inline-block;margin-left:8px;padding:5px 10px;border-radius:999px;background:rgba(52,199,89,.14);color:var(--green);font-size:12px;font-weight:700">' + signalStatus.label + '</div>';
  }
  h += '<div class="hero-price ' + pos + '">' + Number(view.price).toFixed(2) + '</div>';
  h += '<div class="hero-meta">科创综指 <strong>000680.SH</strong> &middot; 行情时间 ' + (d.market_time || c.date) + '</div>';
  h += '<div class="hero-right">';
  h += 'DIF <span>' + Number(view.dif).toFixed(2) + '</span>';
  h += 'DEA <span>' + Number(view.dea).toFixed(2) + '</span>';
  h += 'MACD柱 <span>' + Number(view.macd_bar).toFixed(2) + '</span>';
  h += '</div>';
  if (live) {
    h += '<div class="hero-meta" style="margin-top:8px">盘中估算净值：策略 <strong>' + Number(live.strategy_nav).toFixed(4) + '</strong> · 基准 <strong>' + Number(live.benchmark_nav).toFixed(4) + '</strong>（盘中估算）</div>';
  }
  h += '<div class="update-tag">生成时间 ' + (d.generated_time || d.update_time) + '</div>';
  h += '</div>';

  // ── Module 1.1: 逼近穿越提醒 ──
  if (d.approaching) {
    var ap = d.approaching;
    var warnClass = '';
    var icon = '';
    if (ap.approaching_dead) {
      warnClass = ' warn-dead';
      icon = '⚠️';
    } else if (ap.approaching_gold) {
      warnClass = ' warn-gold';
      icon = '🔔';
    }
    // 进度条: 距离越近越满, >20%=远, <8%=危险
    var barPct = Math.max(0, Math.min(100, 100 - ap.distance_pct * 5));
    var barStyle = ap.distance_pct < 8 ? 'close' : (ap.distance_pct < 20 ? 'near' : 'far');
    var pctColor = ap.distance_pct < 8 ? (ap.approaching_dead ? 'var(--red)' : 'var(--green)') : 'var(--secondary)';

    h += '<div class="app-card' + warnClass + '">';
    if (icon) h += '<div class="app-icon">' + icon + '</div>';
    h += '<div class="app-body">';
    h += '<div class="app-title">' + ap.alert + '</div>';
    h += '<div class="app-sub">' + ap.direction + '</div>';
    h += '</div>';
    h += '<div class="app-bar-wrap"><div class="app-bar-fill ' + barStyle + '" style="width:' + barPct + '%"></div></div>';
    h += '<div class="app-pct" style="color:' + pctColor + '">' + ap.distance_pct.toFixed(1) + '%</div>';
    h += '</div>';
  }

  // ── Module 1.5: 净值曲线 ──
  if (d.nav_monthly && d.nav_monthly.length) {
    var nav = d.nav_monthly;
    var sVals = nav.map(function(p) { return p.strategy; });
    var bVals = nav.map(function(p) { return p.benchmark; });
    var navMax = Math.max.apply(null, sVals.concat(bVals));
    // Y axis: start from 1, round up navMax to nearest 0.5
    var navMin = 1;
    navMax = Math.ceil(navMax * 2) / 2; // e.g. 4.42 -> 4.5
    if (navMax < 2) navMax = 2;

    var W = 860, H = 300, PL = 48, PR = 16, PT = 16, PB = 36;
    var cw = W - PL - PR, ch = H - PT - PB;
    function nx(i) { return PL + (i / (nav.length - 1)) * cw; }
    function ny(v) { return PT + (1 - (v - navMin) / (navMax - navMin)) * ch; }

    var sPath = '', bPath = '';
    sVals.forEach(function(v, i) { sPath += (i === 0 ? 'M' : 'L') + nx(i).toFixed(1) + ',' + ny(v).toFixed(1); });
    bVals.forEach(function(v, i) { bPath += (i === 0 ? 'M' : 'L') + nx(i).toFixed(1) + ',' + ny(v).toFixed(1); });
    var sFill = sPath + 'L' + nx(nav.length - 1).toFixed(1) + ',' + ny(navMin).toFixed(1) + 'L' + nx(0).toFixed(1) + ',' + ny(navMin).toFixed(1) + 'Z';

    // Grid: 1, 1.5, 2, 2.5, 3, 3.5, 4, 4.5 ...
    var gridLines = '';
    for (var gv = navMin; gv <= navMax + 0.01; gv += 0.5) {
      var gy = ny(gv);
      gridLines += '<line x1="' + PL + '" y1="' + gy.toFixed(1) + '" x2="' + (W - PR) + '" y2="' + gy.toFixed(1) + '" stroke="rgba(84,84,88,0.18)" stroke-width="1"/>';
      gridLines += '<text x="' + (PL - 6) + '" y="' + (gy + 4).toFixed(1) + '" text-anchor="end" class="nc-label">' + gv.toFixed(1) + '</text>';
    }

    // X labels: every Jan
    var xLabels = '';
    nav.forEach(function(p, i) {
      var yr = p.date.substring(0, 4);
      var mo = p.date.substring(5, 7);
      if (mo === '01' || i === 0 || i === nav.length - 1) {
        var lbl = mo === '01' ? yr : (i === 0 ? p.date.substring(0,7) : p.date.substring(0,7));
        xLabels += '<text x="' + nx(i).toFixed(1) + '" y="' + (H - 6) + '" text-anchor="middle" class="nc-label">' + lbl + '</text>';
      }
    });

    var lastS = sVals[sVals.length - 1];
    var lastB = bVals[bVals.length - 1];

    h += '<div class="mod">';
    h += '<div class="mod-head">净值曲线 &middot; 回测区间 2020 — 至今</div>';
    h += '<div class="nav-chart-wrap">';
    h += '<div class="nc-current">';
    h += '<div class="nc-current-item"><div class="nc-current-label">策略净值</div><div class="nc-current-val up">' + lastS.toFixed(3) + '</div></div>';
    h += '<div class="nc-current-item"><div class="nc-current-label">基准净值</div><div class="nc-current-val" style="color:var(--secondary)">' + lastB.toFixed(3) + '</div></div>';
    h += '<div class="nc-current-item"><div class="nc-current-label">超额净值</div><div class="nc-current-val ' + sign(lastS - lastB) + '">' + (lastS - lastB).toFixed(3) + '</div></div>';
    h += '</div>';
    h += '<svg viewBox="0 0 ' + W + ' ' + H + '" preserveAspectRatio="xMidYMid meet">';
    h += gridLines + xLabels;
    h += '<path d="' + sFill + '" fill="rgba(48,209,88,0.06)"/>';
    h += '<path d="' + bPath + '" fill="none" stroke="rgba(142,142,147,0.3)" stroke-width="1.5" stroke-dasharray="6,4"/>';
    h += '<path d="' + sPath + '" fill="none" stroke="#30D158" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>';
    h += '<circle cx="' + nx(nav.length - 1).toFixed(1) + '" cy="' + ny(lastS).toFixed(1) + '" r="4" fill="#30D158"/>';
    h += '<circle cx="' + nx(nav.length - 1).toFixed(1) + '" cy="' + ny(lastB).toFixed(1) + '" r="3" fill="rgba(142,142,147,0.5)"/>';
    h += '</svg>';
    h += '<div class="nc-legend"><span><i style="background:#30D158"></i>策略 MACD(12/18/13)</span><span><i style="background:rgba(142,142,147,0.4)"></i>基准 买入持有</span></div>';
    h += '</div></div>';
  }

   // ── Module 2: 实时盘中监测（仅当有数据时显示）──
  if (d.realtime) {
    var rt = d.realtime;
    var cc = rt.cross_up ? 'cross-up' : rt.cross_down ? 'cross-down' : '';
    var ac = rt.cross_up ? 'up' : rt.cross_down ? 'down' : 'neutral';
    var icon = rt.cross_up ? '&#9650; ' : rt.cross_down ? '&#9660; ' : '';
    h += '<div class="mod">';
    h += '<div class="mod-head">盘中实时监测</div>';
    h += '<div class="rt-card ' + cc + '">';
    h += '<div class="rt-head"><span class="rt-dot"></span>15 分钟级别 MACD</div>';
    h += '<div class="rt-alert ' + ac + '">' + icon + (rt.alert || '--') + '</div>';
    h += '<div class="rt-grid">';
    h += '<div class="rt-item">时间 <b>' + (rt.time ? rt.time.split(' ')[1] || rt.time : '--') + '</b></div>';
    h += '<div class="rt-item">实时价 <b>' + (rt.price ? rt.price.toFixed(2) : '--') + '</b></div>';
    h += '<div class="rt-item">DIF <b>' + (rt.rt_dif != null ? rt.rt_dif.toFixed(2) : '--') + '</b></div>';
    h += '<div class="rt-item">DEA <b>' + (rt.rt_dea != null ? rt.rt_dea.toFixed(2) : '--') + '</b></div>';
    h += '<div class="rt-item">MACD <b>' + (rt.rt_macd_bar != null ? rt.rt_macd_bar.toFixed(2) : '--') + '</b></div>';
    h += '<div class="rt-item">DIF-DEA <b class="' + (rt.distance >= 0 ? 'up' : 'down') + '">' + (rt.distance != null ? rt.distance.toFixed(2) : '--') + '</b></div>';
    h += '</div></div></div>';
  }

  // ── Module 3: 回测指标 ──
  h += '<div class="mod">';
  h += '<div class="mod-head">策略回测 &middot; 回测区间 2020-01 — 至今</div>';
  h += '<div class="metrics">';
  h += '<div class="m-cell"><div class="m-label">年化收益</div><div class="m-val ' + sign(p.annual_return) + '">' + pct(p.annual_return) + '</div><div class="m-sub">基准 ' + pct(b.annual_return) + '</div></div>';
  h += '<div class="m-cell"><div class="m-label">最大回撤</div><div class="m-val down">' + pct(p.max_drawdown) + '</div><div class="m-sub">基准 ' + pct(b.max_drawdown) + '</div></div>';
  h += '<div class="m-cell"><div class="m-label">夏普比率</div><div class="m-val">' + p.sharpe.toFixed(2) + '</div><div class="m-sub">共 ' + p.total_trades + ' 笔交易</div></div>';
  h += '<div class="m-cell"><div class="m-label">胜率</div><div class="m-val">' + p.win_rate.toFixed(1) + '%</div><div class="m-sub">盈亏比 ' + p.profit_factor.toFixed(2) + '</div></div>';
  h += '</div></div>';

  // ── Module 4: 年度收益对比 ──
  if (d.yearly && d.yearly.length) {
    var mx = 0;
    d.yearly.forEach(function(y) { mx = Math.max(mx, Math.abs(y.strategy), Math.abs(y.benchmark)); });
    var maxH = 55, scale = maxH / Math.max(mx, 1);
    h += '<div class="mod"><div class="mod-head">年度收益对比</div>';
    h += '<div class="chart"><div class="chart-wrap">';
    h += '<div class="chart-zero"></div>';
    h += '<div class="chart-bars">';
    d.yearly.forEach(function(y) {
      h += '<div class="bar-col" style="position:relative">';
      // Strategy bar
      var sH = Math.round(Math.abs(y.strategy) * scale);
      if (y.strategy >= 0) {
        h += '<div class="bar sp pos" style="position:absolute;bottom:50%;left:50%;transform:translateX(-50%);width:20px;height:' + sH + 'px">';
        h += '<span class="bar-tip above ' + sign(y.strategy) + '">+' + y.strategy.toFixed(0) + '%</span></div>';
      } else {
        h += '<div class="bar sn neg" style="position:absolute;top:50%;left:50%;transform:translateX(-50%);width:20px;height:' + sH + 'px">';
        h += '<span class="bar-tip below ' + sign(y.strategy) + '">' + y.strategy.toFixed(0) + '%</span></div>';
      }
      // Benchmark bar
      var bH = Math.round(Math.abs(y.benchmark) * scale);
      if (y.benchmark >= 0) {
        h += '<div class="bar bp pos" style="position:absolute;bottom:50%;left:calc(50% + 13px);width:20px;height:' + bH + 'px">';
        h += '<span class="bar-tip above ' + sign(y.benchmark) + '">+' + y.benchmark.toFixed(0) + '%</span></div>';
      } else {
        h += '<div class="bar bn neg" style="position:absolute;top:50%;left:calc(50% + 13px);width:20px;height:' + bH + 'px">';
        h += '<span class="bar-tip below ' + sign(y.benchmark) + '">' + y.benchmark.toFixed(0) + '%</span></div>';
      }
      h += '<div class="bar-yr">' + y.year + '</div>';
      h += '</div>';
    });
    h += '</div></div>';
    h += '<div class="legend"><span><i style="background:var(--green)"></i>策略</span><span><i style="background:rgba(142,142,147,0.3)"></i>基准</span></div>';
    h += '</div></div>';
  }

  // ── Module 5: 全部交易明细 ──
  var tradesData = d.all_trades || [];
  if (tradesData.length) {
    h += '<div class="mod"><div class="mod-head">交易明细（共 ' + tradesData.length + ' 笔）</div>';
    h += '<div class="tbl-wrap"><div class="tbl-scroll"><table><thead><tr>';
    h += '<th>买入日</th><th>卖出日</th><th>买入价</th><th>卖出价</th><th>策略收益</th><th>基准收益</th><th>超额</th><th>持仓</th>';
    h += '</tr></thead><tbody>';
    tradesData.slice().reverse().forEach(function(t) {
      h += '<tr>';
      h += '<td>' + t.entry_date + '</td><td>' + t.exit_date + '</td>';
      h += '<td>' + t.entry_price.toFixed(0) + '</td><td>' + t.exit_price.toFixed(0) + '</td>';
      h += '<td class="' + sign(t.return) + '">' + pct(t.return) + '</td>';
      h += '<td class="' + sign(t.bh_return) + '">' + pct(t.bh_return) + '</td>';
      h += '<td class="' + sign(t.excess) + '">' + pct(t.excess) + '</td>';
      var holdingText = Number.isFinite(Number(t.holding_days)) ? Number(t.holding_days) + ' 天' : '—';
      h += '<td>' + holdingText + '</td>';
      h += '</tr>';
    });
    h += '</tbody></table></div></div></div>';
  }

  // ── Module 6: 全部信号历史 ──
  var signalsData = d.all_signals || [];
  if (signalsData.length) {
    h += '<div class="mod"><div class="mod-head">信号历史（共 ' + signalsData.length + ' 个）</div>';
    h += '<div class="tbl-wrap"><div class="tbl-scroll"><table><thead><tr>';
    h += '<th>日期</th><th>方向</th><th>收盘价</th><th>DIF</th><th>DEA</th><th>MACD柱</th>';
    h += '</tr></thead><tbody>';
    signalsData.slice().reverse().forEach(function(s) {
      var dir = s.type === 'buy'
        ? '<span class="up">金叉买入</span>'
        : '<span class="down">死叉卖出</span>';
      h += '<tr><td>' + s.date + '</td><td>' + dir + '</td><td>' + s.close.toFixed(2) + '</td>';
      h += '<td>' + s.dif.toFixed(2) + '</td><td>' + s.dea.toFixed(2) + '</td><td>' + s.macd_bar.toFixed(2) + '</td></tr>';
    });
    h += '</tbody></table></div></div></div>';
  }

  document.getElementById('app').innerHTML = h;
}

loadData(render);
</script>
</body>
</html>
